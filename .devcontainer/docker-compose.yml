services:
  agent:
    container_name: 1c-ai-sandbox
    hostname: 1c-ai-sandbox
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      # ONEC_VERSION is resolved inside Dockerfile from infra/vm/.env when build arg is not passed.
      secrets:
        - onec_username
        - onec_password
        - dev_login
        - dev_password
    environment:
      # Some 1C tools require an X server even in "batch" mode.
      # We run Xvfb on :99 in entrypoint to satisfy this requirement.
      DISPLAY: ":99"
      # Force UTF-8 locale inside the sandbox so Cyrillic file names are preserved.
      LANG: "ru_RU.UTF-8"
      LC_ALL: "ru_RU.UTF-8"
      LC_CTYPE: "ru_RU.UTF-8"
      LANGUAGE: "ru_RU:ru"
    env_file:
      - .env
      - ../infra/vm/.env
    # Runtime secrets (mounted into /run/secrets/*). Required for onec-activate-community.sh.
    secrets:
      - dev_login
      - dev_password
      - github_token
      - cc_api_key
    ports:
      # noVNC (browser) and VNC access to Xvfb :99
      - "6080:6080"
      - "5900:5900"
    volumes:
      # Separate workspace volume for 1C sandbox
      - agent-work-sandbox-1c:/workspaces/work
      # Persist OneScript + Vanessa tooling across rebuilds
      - onescript-cache-1c:/opt/onescript
      # Persist licenses across rebuilds
      - onec-licenses:/var/1C/licenses
      # Persist entire vscode home across rebuilds (CLI configs, sessions, history, gh auth, etc.)
      - agent-home-1c:/home/vscode
      # Clipboard image sync: host tray app writes PNG, container reads (read-only).
      - ${TEMP:-/tmp}/cb-x11-sync:/tmp/cb-x11-sync:ro
      # Docker-outside-of-Docker (DoD): give the sandbox access to the host Docker daemon.
      # WARNING: access to docker.sock is effectively root-equivalent on the Docker host.
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    extra_hosts:
      - "STEEL-PC:host-gateway"
      # 1C infra VM (mgmt IP) is synced dynamically from infra/vm/.env by .devcontainer/sync-onec-infra-hosts.sh
    networks:
      default: {}
      infra:
        ipv4_address: ${AGENT_INFRA_AGENT_IP:-192.168.0.10}

secrets:
  # Build-time: download platform from releases.1c.ru (BuildKit secrets)
  onec_username:
    file: ../secrets/onec_username
  onec_password:
    file: ../secrets/onec_password
  # Runtime: community activation (read by activation script)
  dev_login:
    file: ../secrets/dev_login
  dev_password:
    file: ../secrets/dev_password
  # Runtime: GitHub CLI auth (PAT). Used by .devcontainer/gh-auth-bootstrap.sh
  github_token:
    file: ../secrets/github_token
  cc_api_key:
    file: ../secrets/cc_api_key

volumes:
  agent-work-sandbox-1c:
    name: agent-work-sandbox-1c
    external: true
  onescript-cache-1c:
    name: onescript-cache-1c
    external: true
  onec-licenses:
    name: onec-licenses
    external: true
  agent-home-1c:
    name: agent-home-1c

networks:
  infra:
    external: true
    name: ${AGENT_INFRA_NETWORK:-infra}
